version: "3.8"

services:
  app:
    build: .
    container_name: poseverse_app
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGODB_URI=mongodb://db:27017/poseverse
      - PEXELS_API_KEY=${PEXELS_API_KEY}
      - JWT_SECRET=${JWT_SECRET:-super-secret-key-123}
    depends_on:
      - db
    restart: always

  db:
    image: mongo:6.0
    container_name: poseverse_db
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: always

volumes:
  mongo_data:
